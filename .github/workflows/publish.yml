name: Publish

on:
  push:
    tags:
      - "v*.*.*"

# Required for npm provenance (links the publish to this workflow run).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm run test

      - run: pnpm run build

      # `npm publish` is used here (not `pnpm publish`) because npm's
      # --provenance flag emits the OIDC attestation; pnpm passes the flag
      # through but npm's tooling is the supported path.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
